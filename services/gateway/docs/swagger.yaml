        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "502":
